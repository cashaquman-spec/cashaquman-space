!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            width: 500px;
            max-width: 90%;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        #taskInput {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        #taskInput:focus {
            border-color: #764ba2;
        }
        #addBtn {
            background: #764ba2;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }
        #addBtn:hover {
            background: #5a3a7a;
            transform: scale(1.02);
        }
        .filters {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .filter-btn {
            background: #f0f0f0;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        .filter-btn.active {
            background: #764ba2;
            color: white;
        }
        #taskList {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
        }
        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #f9f9f9;
            margin-bottom: 10px;
            border-radius: 10px;
            transition: 0.3s;
        }
        .task-item:hover {
            background: #f1f1f1;
        }
        .task-text {
            flex: 1;
            cursor: pointer;
            font-size: 16px;
        }
        .task-text.completed {
            text-decoration: line-through;
            color: #aaa;
        }
        .delete-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .delete-btn:hover {
            background: #ee5a5a;
        }
        .empty {
            text-align: center;
            color: #888;
            padding: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📝 Todo List</h1>
    <div class="input-area">
        <input type="text" id="taskInput" placeholder="Shaqo cusub gali...">
        <button id="addBtn">Kudar</button>
    </div>
    <div class="filters">
        <button class="filter-btn active" data-filter="all">Dhammaan</button>
        <button class="filter-btn" data-filter="pending">Aan dhammaysan</button>
        <button class="filter-btn" data-filter="completed">La dhammaystay</button>
    </div>
